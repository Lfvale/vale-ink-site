<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Easter Quest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Easter Quest</h1>
    
    <p class="hint">
        Every hunt starts somewhere.<br><br>
        Where we play, I exist. where I hunt, you shall continue.
        Without you, it wouldn't be as intriguing, what am I?
        (New messages appear regularly.)
    </p>

    <input type="text" id="answer" placeholder="Enter your answer...">
    <button onclick="checkAnswer()">Submit</button>

    <p id="response"></p>
</div>

<script>
function checkAnswer() {
    let input = document.getElementById("answer").value.toLowerCase();

    if (input === "steam") {
        window.location.href = "https://steamcommunity.com/id/Zen178/";
    } else {
        document.getElementById("response").innerText = "Not quite...";
    }
}
</script>

</body>
</html>
